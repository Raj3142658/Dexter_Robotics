controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    # Joint State Broadcaster - publishes joint states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Left Arm Controller - FollowJointTrajectory for left arm
    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Right Arm Controller - FollowJointTrajectory for right arm
    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Left Gripper Controller
    left_arm_gripper:
      type: joint_trajectory_controller/JointTrajectoryController

    # Right Gripper Controller
    right_arm_gripper:
      type: joint_trajectory_controller/JointTrajectoryController

# Left Arm Controller Configuration
left_arm_controller:
  ros__parameters:
    joints:
      - j1l
      - j2l
      - j3l
      - j4l
      - j5l
      - j6l

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Right Arm Controller Configuration
right_arm_controller:
  ros__parameters:
    joints:
      - j1r
      - j2r
      - j3r
      - j4r
      - j5r
      - j6r

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Left Gripper Controller Configuration
left_arm_gripper:
  ros__parameters:
    joints:
      - j7l1
      - j7l2

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Right Gripper Controller Configuration (dual-finger: j7r1 + j7r2)
right_arm_gripper:
  ros__parameters:
    joints:
      - j7r1
      - j7r2

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

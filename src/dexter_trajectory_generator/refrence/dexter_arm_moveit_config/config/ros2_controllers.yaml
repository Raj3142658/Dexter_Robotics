      j2r: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j3r: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j4r: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }

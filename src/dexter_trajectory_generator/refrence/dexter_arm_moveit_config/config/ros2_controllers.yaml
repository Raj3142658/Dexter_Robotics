# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

# Controllers must be top-level keys (not nested under controller_manager)
joint_state_broadcaster:
  ros__parameters:
    type: "joint_state_broadcaster/JointStateBroadcaster"

left_arm_controller:
  ros__parameters:
    type: "joint_trajectory_controller/JointTrajectoryController"
    joints:
      - j1l
      - j2l
      - j3l
      - j4l
      - j5l
      - j6l
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Trajectory tolerances
    allow_partial_joints_goal: false
    state_publish_rate: 50
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
    gains:
      j1l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j2l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j3l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j4l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j5l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }
      j6l: { p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0 }


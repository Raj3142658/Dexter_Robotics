# ═══════════════════════════════════════════════════════════════════════════════
# DEXTER Shape Trajectory — Config File
# ═══════════════════════════════════════════════════════════════════════════════
# This file defines:
#   1. Which arm to use
#   2. The work surface orientation (defines the plane the shape lives in)
#   3. The reference point (anchor in world frame)
#   4. The shape + its dimensions
#   5. Execution parameters (speed, resolution)
#
# Pass to the node:
#   ros2 run dexter_trajectory_generator trajectory_node \
#       --ros-args -p config_file:=/path/to/this/file.yaml \
#                  -p output_file:=/path/to/output.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── ARM ────────────────────────────────────────────────────────────────────────
# Options: 'left' | 'right'
arm: left

# ── WORK SURFACE ───────────────────────────────────────────────────────────────
# normal: unit vector pointing AWAY from the surface (tool will point INTO it)
# tool_tilt_deg: forward tilt of tool in travel direction (0 = perpendicular)
#   0°  = tool straight down (engraving, drilling)
#   10° = slight forward tilt (light welding, glue dispensing)
#   15° = standard welding torch angle
surface:
  normal: [0.0, 0.0, 1.0]     # XY horizontal table, tool points down
  tool_tilt_deg: 0.0

# ── REFERENCE POINT (world frame, meters) ──────────────────────────────────────
# For circle/rectangle/arc/spiral: this is the CENTER
# For line/zigzag:                 this is the START POINT (left end)
# Use the workspace analyzer tool to verify this is reachable!
reference_point:
  x: -0.250   # Left arm, 250mm forward
  y:  0.000   # Centered
  z:  0.200   # 200mm above base (table height)

# ── SHAPE ──────────────────────────────────────────────────────────────────────
# Uncomment ONE shape block. All dimensions in meters / degrees.

# --- CIRCLE ---
shape:
  type: circle
  radius: 0.08         # 80mm radius
  n_points: 100        # number of Cartesian waypoints (higher = smoother)

# --- LINE ---
# shape:
#   type: line
#   length: 0.150        # 150mm total length
#   direction_u: 1.0     # travel direction in surface U axis (default: +U = +X for XY plane)
#   direction_v: 0.0
#   n_points: 60

# --- RECTANGLE ---
# shape:
#   type: rectangle
#   width:  0.120        # 120mm wide (along U axis)
#   height: 0.080        # 80mm tall  (along V axis)
#   n_points: 120

# --- ARC ---
# shape:
#   type: arc
#   radius: 0.100
#   start_angle_deg: -90.0
#   end_angle_deg:    90.0
#   n_points: 80

# --- ZIGZAG ---
# shape:
#   type: zigzag
#   length:    0.150     # total length along travel direction
#   zag_width: 0.040     # amplitude of each zig
#   steps:     6         # number of zag teeth
#   n_points:  80

# --- SPIRAL ---
# shape:
#   type: spiral
#   inner_radius: 0.030
#   outer_radius: 0.100
#   turns:        2.5
#   n_points:     120

# ── EXECUTION PARAMETERS ───────────────────────────────────────────────────────
# These are passed as ROS2 node parameters (can also be set via --ros-args)
# but documented here for reference:
#
#   eef_step:                  0.005   # Cartesian resolution (meters). Smaller = smoother but slower IK
#   jump_threshold:            0.0     # Joint jump threshold. 0 = disabled. Try 3.0 if robot jumps.
#   max_velocity_scaling:      0.3     # 0.0–1.0. Start low (0.2–0.3) for first runs.
#   max_acceleration_scaling:  0.1     # 0.0–1.0. Keep lower than velocity.
#   avoid_collisions:          true
#   time_param_method:         totg    # 'totg' (safe default) or 'ruckig' (jerk-limited, smoother)
